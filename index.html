<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fylo-Data-Storage-Component</title>
    <link rel="stylesheet" href="Style/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <section class="main-1">
        <img src="images/logo.svg" alt="Main Logo" />
        <ul>
          <li><img src="images/icon-document.svg" alt="Icon-Document" /></li>
          <li><img src="images/icon-folder.svg" alt="Icon-Folder" /></li>
          <li><img src="images/icon-upload.svg" alt="Icon-Upload" /></li>
        </ul>
      </section>
      <section class="main-2">
        <p>You’ve used <span class="one">815 GB</span> of your storage</p>
        <div class="show"><span>185</span> <span>GB Left</span></div>
        <div class="Progress"><span></span></div>
        <div class="details"><span>0 GB</span><span>1000 GB</span></div>
      </section>
    </div>
    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="https://github.com/O-h-coder">Omar Hanfy</a>.
    </div>
  </body>
</html>
