<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fylo data storage component</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="Style-Cheet/all.min.css">
  </head>
  <body>
    <div class="container">
      <div class="box1">
        <i class="fa-solid fa-layer-group"></i>
        <h1>Fylo</h1>
        <div class="links">
          <i class="fa-solid fa-file"></i>
          <i class="fa-solid fa-folder"></i>
          <i class="fa-solid fa-cloud-arrow-up"></i>
        </div>
      </div>
      <div class="box2">
        <p>You’ve used 815 GB of your storage</p>
        <span class="prog" data-progress="width: 81.5%;"> <!-- Progress Bar --> </span>
        <div class="storage">
          <p>185 GB Left</p>
          <p>0 GB</p>
          <p>1000 GB</p>
        </div>
      </div>
    </div>
  </body>
</html>
