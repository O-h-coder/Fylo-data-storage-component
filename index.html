<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fylo data storage component</title>
    <link rel="stylesheet" href="Style-Cheet/main.css" />
    <link rel="stylesheet" href="Style-Cheet/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <div class="box1">
          <div class="logo">
            <img src="images/logo.svg" alt="Logo" />
          </div>
          <ul>
            <li class="LO1"><i class="fa-solid fa-file"></i></li>
            <li class="LO2"><i class="fa-solid fa-folder"></i></li>
            <li class="LO3"><i class="fa-solid fa-cloud-arrow-up"></i></li>
          </ul>
        </div>
        <div class="box2">
          <p class="title-p">You’ve used <b>815 GB</b> of your storage</p>
          <span class="prog"></span>
          <p class="first-counter">0 GB</p>
          <p class="last-counter">1000 GB</p>
          <p class="free-counter">185 <span>GB Left</span></p>
        </div>
      </div>
    </div>
  </body>
</html>
